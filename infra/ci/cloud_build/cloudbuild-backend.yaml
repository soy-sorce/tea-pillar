steps:
  - name: "gcr.io/cloud-builders/docker"
    id: build-backend
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/video-gen4cat-backend:$COMMIT_SHA"
      - -t
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/video-gen4cat-backend:latest"
      - -f
      - backend/Dockerfile
      - backend/

  - name: "gcr.io/cloud-builders/docker"
    id: push-backend-sha
    waitFor:
      - build-backend
    args:
      - push
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/video-gen4cat-backend:$COMMIT_SHA"

  - name: "gcr.io/cloud-builders/docker"
    id: push-backend-latest
    waitFor:
      - build-backend
    args:
      - push
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/video-gen4cat-backend:latest"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-backend
    waitFor:
      - push-backend-sha
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE_NAME}"
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/video-gen4cat-backend:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --ingress=all
      - --allow-unauthenticated
      - --service-account=${_SERVICE_ACCOUNT}
      - --cpu=2
      - --memory=2Gi
      - --timeout=360
      - --min-instances=1
      - --max-instances=10
      - --concurrency=10
      - --set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,GCP_REGION=${_REGION},MODEL_SERVICE_URL=${_MODEL_SERVICE_URL},GCS_BUCKET_NAME=${_GCS_BUCKET_NAME},REACTION_VIDEO_BUCKET_NAME=${_REACTION_VIDEO_BUCKET_NAME},FIRESTORE_DATABASE_ID=${_FIRESTORE_DATABASE_ID},FRONTEND_ORIGIN=${_FRONTEND_ORIGIN},ENVIRONMENT=${_ENVIRONMENT},LOG_LEVEL=${_LOG_LEVEL},GCS_SIGNED_URL_EXPIRATION_HOURS=${_GCS_SIGNED_URL_EXPIRATION_HOURS},REACTION_VIDEO_UPLOAD_URL_EXPIRES_SECONDS=${_REACTION_VIDEO_UPLOAD_URL_EXPIRES_SECONDS}
      - --quiet

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/video-gen4cat-backend:$COMMIT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/video-gen4cat-backend:latest"

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: "asia-northeast1"
  _REPOSITORY: "nekkoflix"
  _SERVICE_NAME: "video-gen4cat-backend"
  _SERVICE_ACCOUNT: "REPLACE_ME_BACKEND_SERVICE_ACCOUNT"
  _MODEL_SERVICE_URL: "https://REPLACE_ME_MODEL_SERVICE_URL"
  _GCS_BUCKET_NAME: "REPLACE_ME_GCS_BUCKET"
  _REACTION_VIDEO_BUCKET_NAME: "REPLACE_ME_REACTION_BUCKET"
  _FIRESTORE_DATABASE_ID: "(default)"
  _FRONTEND_ORIGIN: "https://REPLACE_ME_FRONTEND_URL"
  _ENVIRONMENT: "development"
  _LOG_LEVEL: "INFO"
  _GCS_SIGNED_URL_EXPIRATION_HOURS: "1"
  _REACTION_VIDEO_UPLOAD_URL_EXPIRES_SECONDS: "900"
