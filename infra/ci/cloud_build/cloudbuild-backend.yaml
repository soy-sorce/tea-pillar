steps:
  - name: "gcr.io/cloud-builders/docker"
    id: build-backend
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/backend:$COMMIT_SHA"
      - -t
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/backend:latest"
      - -f
      - backend/Dockerfile
      - backend/

  - name: "gcr.io/cloud-builders/docker"
    id: push-backend-sha
    waitFor:
      - build-backend
    args:
      - push
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/backend:$COMMIT_SHA"

  - name: "gcr.io/cloud-builders/docker"
    id: push-backend-latest
    waitFor:
      - build-backend
    args:
      - push
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/backend:latest"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-backend
    waitFor:
      - push-backend-sha
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE_NAME}"
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/backend:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --quiet

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/backend:$COMMIT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/backend:latest"

substitutions:
  _REGION: "asia-northeast1"
  _REPOSITORY: "nekkoflix"
  _SERVICE_NAME: "nekkoflix-backend-prod"
