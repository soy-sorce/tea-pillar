steps:
  - name: "gcr.io/cloud-builders/docker"
    id: build-backend
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/video-gen4cat-backend:$COMMIT_SHA"
      - -t
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/video-gen4cat-backend:latest"
      - -f
      - backend/Dockerfile
      - backend/

  - name: "gcr.io/cloud-builders/docker"
    id: push-backend-sha
    waitFor:
      - build-backend
    args:
      - push
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/video-gen4cat-backend:$COMMIT_SHA"

  - name: "gcr.io/cloud-builders/docker"
    id: push-backend-latest
    waitFor:
      - build-backend
    args:
      - push
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/video-gen4cat-backend:latest"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-backend
    waitFor:
      - push-backend-sha
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE_NAME}"
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/video-gen4cat-backend:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --set-env-vars=MODEL_SERVICE_URL=${_MODEL_SERVICE_URL},REACTION_VIDEO_BUCKET_NAME=${_REACTION_VIDEO_BUCKET_NAME},REACTION_VIDEO_UPLOAD_URL_EXPIRES_SECONDS=${_REACTION_VIDEO_UPLOAD_URL_EXPIRES_SECONDS}
      - --quiet

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/video-gen4cat-backend:$COMMIT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/video-gen4cat-backend:latest"

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: "asia-northeast1"
  _REPOSITORY: "nekkoflix"
  _SERVICE_NAME: "video-gen4cat-backend"
  _MODEL_SERVICE_URL: "https://REPLACE_ME_MODEL_SERVICE_URL"
  _REACTION_VIDEO_BUCKET_NAME: "REPLACE_ME_REACTION_BUCKET"
  _REACTION_VIDEO_UPLOAD_URL_EXPIRES_SECONDS: "900"
