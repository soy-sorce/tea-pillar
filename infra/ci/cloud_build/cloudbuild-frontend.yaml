steps:
  - name: "gcr.io/cloud-builders/docker"
    id: build-frontend
    args:
      - build
      - --build-arg
      - VITE_BACKEND_URL=${_VITE_BACKEND_URL}
      - -t
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/video-gen4cat-frontend:$COMMIT_SHA"
      - -t
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/video-gen4cat-frontend:latest"
      - -f
      - frontend/Dockerfile
      - frontend/

  - name: "gcr.io/cloud-builders/docker"
    id: push-frontend-sha
    waitFor:
      - build-frontend
    args:
      - push
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/video-gen4cat-frontend:$COMMIT_SHA"

  - name: "gcr.io/cloud-builders/docker"
    id: push-frontend-latest
    waitFor:
      - build-frontend
    args:
      - push
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/video-gen4cat-frontend:latest"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-frontend
    waitFor:
      - push-frontend-sha
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE_NAME}"
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/video-gen4cat-frontend:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --ingress=all
      - --allow-unauthenticated
      - --service-account=${_SERVICE_ACCOUNT}
      - --cpu=1
      - --memory=512Mi
      - --timeout=60
      - --min-instances=0
      - --max-instances=10
      - --concurrency=80
      - --quiet

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/video-gen4cat-frontend:$COMMIT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/video-gen4cat-frontend:latest"

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: "asia-northeast1"
  _REPOSITORY: "nekkoflix"
  _SERVICE_NAME: "video-gen4cat-frontend"
  _SERVICE_ACCOUNT: "REPLACE_ME_FRONTEND_SERVICE_ACCOUNT"
  _VITE_BACKEND_URL: "https://video-gen4cat-gateway-17fqo4kd.an.gateway.dev"
