services:
  frontend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:8080}
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: >
      sh -c "if [ ! -d node_modules ]; then npm ci; fi &&
      npm run dev -- --host 0.0.0.0 --port 3000"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /app
    ports:
      - "8080:8080"
    environment:
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GCP_REGION: ${GCP_REGION:-asia-northeast1}
      MODEL_SERVICE_URL: http://model:8080
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME:-}
      REACTION_VIDEO_BUCKET_NAME: ${REACTION_VIDEO_BUCKET_NAME:-}
      FIRESTORE_DATABASE_ID: ${FIRESTORE_DATABASE_ID:-(default)}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      VEO_MODEL: ${VEO_MODEL:-veo-3.1-fast-generate-001}
      GCS_SIGNING_SERVICE_ACCOUNT_FILE: ${GCS_SIGNING_SERVICE_ACCOUNT_FILE:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./backend/src:/app/src
      - ./backend/.env:/app/.env:ro
    command:
      [
        "/app/.venv/bin/uvicorn",
        "src.app:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
        "--reload",
      ]
    depends_on:
      - model

  model:
    build:
      context: ./model
      dockerfile: Dockerfile
    working_dir: /app
    ports:
      - "8081:8080"
    environment:
      MODEL_ARTIFACT_DIR: /app/artifacts
      HF_MODEL_REPO_ID: ${HF_MODEL_REPO_ID:-}
      HF_MODEL_REVISION: ${HF_MODEL_REVISION:-}
      HF_MODEL_CACHE_DIR: ${HF_MODEL_CACHE_DIR:-}
      HF_TOKEN: ${HF_TOKEN:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./model/src:/app/src
      - ./model/artifacts:/app/artifacts
    command:
      [
        "/app/.venv/bin/uvicorn",
        "src.app:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
        "--reload",
      ]

volumes:
  frontend_node_modules:
